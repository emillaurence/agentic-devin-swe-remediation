services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEVIN_API_KEY=${DEVIN_API_KEY}
      - DEVIN_ORG_ID=${DEVIN_ORG_ID}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DEFAULT_GITHUB_OWNER=${DEFAULT_GITHUB_OWNER:-emillaurence}
      - DEFAULT_GITHUB_REPO=${DEFAULT_GITHUB_REPO:-superset}
      - TRIGGER_LABEL=${TRIGGER_LABEL:-devin-remediate}
      - STATUS_RUNNING_LABEL=${STATUS_RUNNING_LABEL:-status:devin-running}
      - STATUS_NEEDS_REVIEW_LABEL=${STATUS_NEEDS_REVIEW_LABEL:-status:devin-needs-human-review}
      - STATUS_COMPLETED_LABEL=${STATUS_COMPLETED_LABEL:-status:devin-completed}
      - STATUS_FAILED_LABEL=${STATUS_FAILED_LABEL:-status:devin-failed}
      - STORE_PATH=${STORE_PATH:-./data/sessions.json}
      - HUMAN_BASELINE_QUALITY_HOURS=${HUMAN_BASELINE_QUALITY_HOURS:-3}
      - HUMAN_BASELINE_SECURITY_HOURS=${HUMAN_BASELINE_SECURITY_HOURS:-10}
      - HUMAN_BASELINE_OTHER_HOURS=${HUMAN_BASELINE_OTHER_HOURS:-6}
      - BLENDED_ENGINEERING_HOURLY_COST=${BLENDED_ENGINEERING_HOURLY_COST:-150}
      - ROI_CURRENCY=${ROI_CURRENCY:-A$}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http app:8000 --log=stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - app
    restart: unless-stopped
